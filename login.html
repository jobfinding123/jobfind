<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <title>Մուտք</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="form-container">
        <h2>Մուտք Գործել</h2>
        <form method="POST">
            <input type="text" name="username" placeholder="Օգտանուն" required><br><br>
            <input type="password" name="password" placeholder="Գաղտնաբառ" required><br><br>
            <button type="submit" class="btn-submit">Մուտք</button>
        </form>
        <p>Դեռ հաշիվ չունե՞ք: <a href="/register">Գրանցվեք</a></p>
    </div>
</body>
</html>
